[package]
name = "smolder-core"
version = "0.1.0"
edition = "2021"
authors = ["M00NLIG7"]
description = "Smolder core - Part of the Smolder SMB toolkit"
repository = "https://github.com/M00NLIG7/smolder"
license = "MIT"

[dependencies]
async-trait = "0.1"
bitflags = "2"
bytes = "1"
hmac = "0.12"
md-5 = "0.10"
md4 = "0.10"
rand = "0.8"
smolder-proto = { path = "../smolder-proto" }
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "rt", "sync"] }
tracing = "0.1"
