services:
  samba-quic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smolder-samba-quic
    environment:
      SERVER_NAME: ${SERVER_NAME:-files.lab.example}
      WORKGROUP: ${WORKGROUP:-WORKGROUP}
      USERNAME: ${USERNAME:-smolder}
      PASSWORD: ${PASSWORD:-smolderpass}
      SHARE_NAME: ${SHARE_NAME:-share}
    ports:
      - "${SMOLDER_SAMBA_QUIC_HOST_SMB_PORT:-1445}:445/tcp"
      - "${SMOLDER_SAMBA_QUIC_HOST_QUIC_PORT:-1443}:443/udp"
    volumes:
      - ./share:/srv/share
      - ./certs:/tls-input:ro
