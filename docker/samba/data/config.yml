auth:
  - user: smolder
    group: smolder
    uid: 1000
    gid: 1000
    password: smolderpass

global:
  - "map to guest = never"
  - "server min protocol = SMB2_10"

share:
  - name: share
    path: /samba/share
    browsable: yes
    readonly: no
    guestok: no
    validusers: smolder
    writelist: smolder
